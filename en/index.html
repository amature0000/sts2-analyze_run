<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Run Analyzer</title>
  <style>
    .chart_table {
      width: 70%;
    }

    .chart_row {
      display: flex;
    }

    .chart_container {
      flex: 1;
      height: 300px;
    }

    .spacer {
      height: 50px;
    }

    #playerSelect {
      padding: 6px 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background-color: #fff;
      color: #333;
      outline: none;
      cursor: pointer;
    }

    #playerSelect:hover {
      border-color: #888;
    }

    #playerSelect:focus {
      border-color: #555;
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>
  <h1>Run Analyzer</h1>
  <select id="playerSelect"></select>

  <div id="summary"></div>
  <div id="deck"></div>
  <div class="spacer"></div>
  <h2> Graphs </h2>
  <div id="actButtons">
    <button data-act="1">Act 1</button>
    <button data-act="2">Act 2</button>
    <button data-act="3">Act 3</button>
  </div>
  <div class="chart_table">
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="hpChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="goldChart"></canvas>
      </div>
    </div>
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="turnChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="deckChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="analyzerun_history.js"></script>
  <script src="main.js"></script>
</body>

</html>
