<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Run Analyzer</title>
  <style>
    .chart_table {
      width: 70%;
    }
    .chart_row {
      display: flex;
    }
    .chart_container {
      flex: 1;
      height: 300px;
    }
    .spacer {
      height: 50px;
    }
  </style>
</head>
<body>
  <h1>Run Analyzer</h1>

  <div id="summary"></div>
  <div id="deck"></div>
  <div class="spacer"></div>
  <h2> 그래프 </h2>
  <div id="actButtons">
    <button data-act="1">1막</button>
    <button data-act="2">2막</button>
    <button data-act="3">3막</button>
  </div>
  <div class="chart_table">
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="hpChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="goldChart"></canvas>
      </div>
    </div>
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="turnChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="deckChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="analyzerun_history.js"></script>
  <script src="main.js"></script>
</body>
</html>
