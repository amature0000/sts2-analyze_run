<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>Run Analyzer</title>
  <link rel="stylesheet" href="myCss.css">
</head>

<body>
  <h1>Run Analyzer</h1>
  <select id="playerSelect"></select>

  <div id="summary"></div>
  <div id="deck"></div>
  <div class="spacer"></div>
  <h2> 그래프 </h2>
  <div id="actButtons">
    <button data-act="1">1막</button>
    <button data-act="2">2막</button>
    <button data-act="3">3막</button>
  </div>
  <div class="chart_table">
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="hpChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="goldChart"></canvas>
      </div>
    </div>
    <div class="chart_row">
      <div class="chart_container">
        <canvas id="turnChart"></canvas>
      </div>
      <div class="chart_container">
        <canvas id="deckChart"></canvas>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="analyzerun_history.js"></script>
  <script src="bg_img.js"></script>
  <script src="main.js"></script>
</body>

</html>
